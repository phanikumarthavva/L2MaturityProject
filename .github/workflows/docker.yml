name: Docker

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: prm-api:ci

      - name: Trivy — full report (non-blocking)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: prm-api:ci
          format: table
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: "0"

      - name: Trivy — SARIF artifact (non-blocking)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: prm-api:ci
          format: sarif
          output: trivy-results.sarif
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif

      - name: Trivy — fail only on critical
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: prm-api:ci
          severity: CRITICAL
          exit-code: "1"
          format: table
