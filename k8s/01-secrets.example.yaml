# -----------------------------------------------------------------------------
# COPY this file to secrets-local.yaml, fill stringData, then apply:
#   kubectl apply -f secrets-local.yaml
# Do NOT commit secrets-local.yaml or real values to Git.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: prm-secrets
  namespace: prm
type: Opaque
stringData:
  # MongoDB reachable from EKS pods (Atlas / DocumentDB / self-hosted + SG rules)
  mongo-uri: "REPLACE_ME_mongodb+srv_or_mongodb_host"
  # Same rules as local .env: at least 16 characters
  jwt-secret: "REPLACE_ME_min_16_chars"
