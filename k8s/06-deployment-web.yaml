# UI + nginx. Image must be your Docker Hub prm-web image (same as frontend Dockerfile build).
# Nginx config is mounted from ConfigMap so /api proxies to Service prm-api.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prm-web
  namespace: prm
  labels:
    app: prm-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prm-web
  template:
    metadata:
      labels:
        app: prm-web
    spec:
      containers:
        - name: web
          image: docker.io/phanikumart/prm-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: nginx-config
          configMap:
            name: prm-web-nginx
